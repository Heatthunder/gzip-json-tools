<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Editor (GZip ↔ JSON ↔ Base64)</title>

    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2026.3.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2026.3.1/core.js"
    ></script>

    <script type="py" src="./web_main.py" config="./conf.json"></script>

    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 1.25rem;
        background: #f7f7f9;
        color: #1f2937;
      }
      .app {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        gap: 0.85rem;
      }
      .row {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }
      #editor,
      #base64-text {
        width: 100%;
        resize: vertical;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.9rem;
      }
      #editor {
        min-height: 330px;
      }
      #base64-text {
        min-height: 140px;
      }
      #status {
        min-height: 1.25rem;
        font-size: 0.95rem;
      }
      .section-title {
        font-size: 0.95rem;
        font-weight: 600;
      }
      #dropzone {
        border: 2px dashed #94a3b8;
        border-radius: 10px;
        padding: 1rem;
        background: #eef2ff;
        color: #334155;
      }
      #dropzone.is-active {
        border-color: #2563eb;
        background: #dbeafe;
      }
      #dropzone ul {
        margin: 0.5rem 0 0;
        padding-left: 1.2rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Save Editor</h1>

      <div class="row">
        <input type="file" id="file-upload" accept=".gzip,.gz" />
        <button id="download-btn" type="button">JSON → Download .json.gz</button>
      </div>

      <section id="dropzone" aria-label="Dropzone for save files and Base64 text">
        <strong>Dropzone</strong>
        <ul>
          <li>Drop <code>.json.gz</code></li>
          <li>Drop <code>.json</code></li>
          <li>Drop/paste Base64 text</li>
        </ul>
      </section>

      <div class="section-title">JSON Editor</div>
      <textarea
        id="editor"
        placeholder="Decoded JSON appears here. You can edit and convert back."
      ></textarea>

      <div class="row">
        <button id="json-to-b64-btn" type="button">JSON → Base64</button>
        <button id="b64-to-json-btn" type="button">Base64 → JSON</button>
        <button id="b64-to-gz-btn" type="button">Base64 → Download .json.gz</button>
      </div>

      <div class="section-title">Base64</div>
      <textarea
        id="base64-text"
        placeholder="Paste Base64 here, or load a .json.gz file to auto-fill this value."
      ></textarea>

      <div id="status" role="status" aria-live="polite"></div>
    </main>
  </body>
</html>
