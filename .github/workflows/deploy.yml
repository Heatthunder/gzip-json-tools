name: Deploy PyScript App to GitHub Pages
run-name: Deploy site from ${{ github.ref_name }}

"on":
  push:
    branches:
      - main
    # Only trigger deployments when site/deployment files change.
    paths:
      - ".github/workflows/deploy.yml"
      - "index.html"
      - "web_main.py"
      - "core_logic.py"
      - "conf.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the project root, which contains index.html.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
